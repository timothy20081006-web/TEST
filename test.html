<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>專注力測驗 - 極速飆分版</title>
<style>
  @font-face {
    font-family: 'Press Start 2P';
    src: url('https://fonts.gstatic.com/s/pressstart2p/v14/8Lg6LZwJ9Nzvlgy5K_S-l2-uT0yE4Z_qR3_P.woff2') format('woff2');
  }
  body {
    text-align: center; font-family: 'Press Start 2P', cursive, sans-serif;
    background: #6B8EFC; color: white; user-select: none; overflow: hidden; margin: 0;
    height: 100vh; display: flex; flex-direction: column; transition: background 0.1s;
  }

  .flash-green { background: #4CAF50 !important; }
  .flash-red { background: #FF4444 !important; }

  .cloud { background: white; border-radius: 50%; position: absolute; z-index: 1; animation: cloud-move 25s linear infinite; }
  .c1 { width: 80px; height: 40px; top: 15%; left: -100px; opacity: 0.8; }
  .c2 { width: 60px; height: 30px; top: 25%; left: -150px; opacity: 0.5; animation-delay: -10s; }
  @keyframes cloud-move { from { transform: translateX(-10vw); } to { transform: translateX(110vw); } }

  #grass { position: absolute; bottom: 0; width: 100%; height: 60px; background: linear-gradient(#8BC34A, #4CAF50); border-top: 4px solid #388E3C; z-index: 2; }
  
  #mario-container { position: absolute; bottom: 60px; left: 40px; width: 32px; height: 32px; z-index: 5; image-rendering: pixelated; transition: transform 0.1s ease-out; }
  #mario-sprite { width: 32px; height: 32px; background-image: url('https://thealphabeat.github.io/Super-Mario-Bros/img/mario-sprites.png'); background-position: -80px -32px; animation: mario-run 0.4s steps(3) infinite; animation-play-state: paused; }
  @keyframes mario-run { from { background-position: -80px -32px; } to { background-position: -160px -32px; } }

  #progress-container { width: 100%; height: 12px; background: rgba(0,0,0,0.3); position: relative; }
  #progress-bar { width: 0%; height: 100%; background: #FFD700; transition: width 0.3s; }

  #instruction-sticky { background: rgba(0,0,0,0.6); padding: 12px 5px; font-size: 10px; line-height: 1.6; border-bottom: 3px solid #FFD700; display: flex; justify-content: center; gap: 10px; letter-spacing: -0.5px; }
  .rule-tag { padding: 2px 6px; border-radius: 4px; border: 1px solid #FFF; }
  .rule-white { background: #FFF; color: #000; }
  .rule-yellow { background: #FFD700; color: #000; }
  .rule-red { background: #FF4444; color: #FFF; }

  #rule-overlay, #practice-result-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); z-index: 200; display: none;
    flex-direction: column; align-items: center; justify-content: center;
  }
  .rule-box { background: #333; border: 4px solid #FFF; padding: 20px; width: 85%; border-radius: 10px; text-align: left; }
  
  #ui-layer { position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; }
  #game-header { padding: 10px; background: rgba(0,0,0,0.2); display: flex; justify-content: space-around; font-size: 10px; align-items: center; }
  #score-display { font-size: 24px; color: #FFD700; text-shadow: 2px 2px #000; }
  
  #letter-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
  #letter { font-size: 100px; font-weight: 900; text-shadow: 5px 5px #000; z-index: 15; transition: transform 0.05s; }
  #mode-tag { position: absolute; top: 20px; font-size: 14px; background: rgba(255,0,0,0.6); padding: 5px 15px; border-radius: 20px; display: none; z-index: 20; }
  
  .feedback-text {
    position: absolute; font-size: 20px; font-weight: bold; text-shadow: 2px 2px #000;
    animation: feedbackUp 0.6s ease-out forwards; pointer-events: none; z-index: 60;
  }
  @keyframes feedbackUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }

  #result-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; color: #FFF; }
  .res-line { font-size: 11px; margin: 8px 0; width: 85%; display: flex; justify-content: space-between; font-family: sans-serif; font-weight: bold; }
  .res-score-big { font-size: 32px; color: #FFD700; margin: 15px 0; text-shadow: 3px 3px #E76900; }

  #control-area { padding-bottom: 80px; }
  button { font-family: 'Press Start 2P', cursive; font-size: 18px; padding: 15px 30px; background: #E76900; color: white; border: 4px solid #000; border-radius: 10px; cursor: pointer; }
  .start-prac-btn { font-size: 12px; background: #5C9400; margin-top: 20px; padding: 12px 20px; }
</style>
</head>
<body onclick="resumeAudio()">

<audio id="bgmMusic" loop preload="auto">
  <source src="https://thealphabeat.github.io/Super-Mario-Bros/audio/01-main-theme-overworld.mp3" type="audio/mpeg">
</audio>

<div class="cloud c1"></div>
<div class="cloud c2"></div>

<div id="rule-overlay">
  <div class="rule-box">
    <div style="text-align:center; color:#FFD700; margin-bottom:20px; font-size:16px;">HOW TO PLAY</div>
    <div style="font-size:11px; margin-bottom:15px; border:1px dashed #FFF; padding:10px; line-height:1.6;">
      ⚪ 白色 X → 按 1 下<br>
      🟡 黃字母 → 連按 2 下<br>
      🔴 其他/紅色 → 🚫 不要按
    </div>
    <center><button class="start-prac-btn" onclick="startPractice()">開始 20 題練習</button></center>
  </div>
</div>

<div id="practice-result-overlay">
  <div class="rule-box" style="border-color: #5C9400; background: #222;">
    <div id="prac-rank" style="text-align:center; color:#8BC34A; margin-bottom:15px; font-size:16px;">TRIAL END</div>
    <div style="font-size:11px; margin-bottom:15px; border-bottom:1px solid #444; padding-bottom:10px; line-height:1.8;">
      練習表現：<br>
      ✅ 正確：<span id="prac-hit" style="color:#8BC34A">0</span><br>
      ❌ 錯誤：<span id="prac-mistake" style="color:#FF4444">0</span><br>
      💨 漏接：<span id="prac-missed" style="color:#FFA500">0</span><br>
      ⚡ 速度：<span id="prac-rt" style="color:#FFD700">0ms</span>
    </div>
    <center><button class="start-prac-btn" style="background:#E76900" onclick="startFinalChallenge()">進入正式挑戰</button></center>
  </div>
</div>

<div id="ui-layer">
  <div id="progress-container"><div id="progress-bar"></div></div>
  <div id="instruction-sticky">
    <span class="rule-tag rule-white">⚪X:1下</span>
    <span class="rule-tag rule-yellow">🟡黃:2下</span>
    <span class="rule-tag rule-red">🚫不按</span>
  </div>

  <div id="game-header">
    <div>TOP: <span id="top-score">000000</span></div>
    <div id="score-display">000000</div>
  </div>
  
  <div id="letter-container">
    <div id="mode-tag">TRIAL MODE</div>
    <div id="letter">FOCUS</div>
    
    <div id="result-screen">
        <div class="res-title">COURSE CLEAR !</div>
        <div class="res-line" style="color:#4CAF50;"><span>CORRECT</span> <span id="res-hit">0</span></div>
        <div class="res-line" style="color:#FF4444;"><span>MISTAKES</span> <span id="res-mistake">0</span></div>
        <div class="res-line" style="color:#FFA500;"><span>MISSED</span> <span id="res-missed">0</span></div>
        <div class="res-line" style="color:#FFD700;"><span>AVG SPEED</span> <span id="res-rt-final">0ms</span></div>
        <div class="res-score-big" id="res-score">000000</div>
        <div style="margin-top:20px; font-size:10px; color:#aaa;">REFRESH TO PLAY AGAIN</div>
    </div>
  </div>

  <div id="control-area">
    <button id="startBtn" onclick="showRules()">PUSH START</button>
  </div>
</div>

<div id="mario-container"><div id="mario-sprite"></div></div>
<div id="grass"></div>

<script>
let score, targetScore, currentDisplayScore, mistakes, missed, total, running, canClick, clickCount;
let currentIsTarget, currentIsYellow, timer, startTime, reactionTimes = [];
let lastWasTarget = false, isPractice = true;
let tickerId = null;

// 字母庫：拿掉 T，僅剩 AKMNVWY
const FILTERED_LETTERS = "AKMNVWY"; 
const PRACTICE_TOTAL = 20;

const bgm = document.getElementById('bgmMusic');
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const marioSprite = document.getElementById('mario-sprite');
const scoreEl = document.getElementById("score-display");
const modeTag = document.getElementById("mode-tag");

function resumeAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); }

function showRules() {
    resumeAudio();
    document.getElementById("startBtn").style.display = "none";
    document.getElementById("rule-overlay").style.display = "flex";
}

function startPractice() {
    document.getElementById("rule-overlay").style.display = "none";
    bgm.currentTime = 0; bgm.play().catch(()=>{});
    marioSprite.style.animationPlayState = 'running';
    resetStats();
    isPractice = true;
    modeTag.style.display = "block";
    modeTag.innerText = `TRIAL: ${PRACTICE_TOTAL} ROUNDS`;
    startScoreTicker();
    nextRound();
}

function startFinalChallenge() {
    document.getElementById("practice-result-overlay").style.display = "none";
    bgm.playbackRate = 1.15;
    resetStats();
    isPractice = false;
    modeTag.style.display = "none";
    sounds.levelUp();
    nextRound();
}

function resetStats() {
    score = 0; targetScore = 0; currentDisplayScore = 0; mistakes = 0; missed = 0; total = 0;
    reactionTimes = []; running = true;
}

function showFeedback(text, color) {
    const feedback = document.createElement("div");
    feedback.className = "feedback-text";
    feedback.innerText = text;
    feedback.style.color = color;
    document.getElementById("letter-container").appendChild(feedback);
    setTimeout(() => feedback.remove(), 600);
}

function flash(type) {
    document.body.classList.add(type === 'good' ? 'flash-green' : 'flash-red');
    setTimeout(() => document.body.classList.remove('flash-green', 'flash-red'), 100);
}

const sounds = {
    coin: () => { playTone(987, 'square', 0.1, 0.05); setTimeout(() => playTone(1318, 'square', 0.15, 0.05), 50); },
    bump: () => playTone(150, 'sawtooth', 0.1, 0.1),
    fall: () => playTone(200, 'triangle', 0.3, 0.1),
    levelUp: () => { playTone(523, 'square', 0.1, 0.1); setTimeout(()=>playTone(659, 'square', 0.1, 0.1), 100); setTimeout(()=>playTone(783, 'square', 0.3, 0.1), 200); }
};

function playTone(freq, type, duration, vol) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

function nextRound() {
    if (isPractice && total >= PRACTICE_TOTAL) {
        running = false;
        const avg = reactionTimes.length ? (reactionTimes.reduce((a,b)=>a+b)/reactionTimes.length).toFixed(0) : "---";
        document.getElementById("prac-hit").innerText = score;
        document.getElementById("prac-mistake").innerText = mistakes;
        document.getElementById("prac-missed").innerText = missed;
        document.getElementById("prac-rt").innerText = avg + "ms";
        document.getElementById("practice-result-overlay").style.display = "flex";
        return;
    }
    if (!isPractice && total >= 100) { endTest(); return; }

    document.getElementById("progress-bar").style.width = (isPractice ? (total/PRACTICE_TOTAL)*100 : total) + "%";
    const letterDiv = document.getElementById("letter");
    letterDiv.innerText = "";
    
    setTimeout(() => {
        if (!running) return;
        let char = FILTERED_LETTERS[Math.floor(Math.random() * FILTERED_LETTERS.length)];
        let isX = (Math.random() < 0.35 && !lastWasTarget);
        if (isX) char = "X";
        const r = Math.random();
        let color = r < 0.25 ? "yellow" : (r < 0.45 ? "red" : "white");
        
        currentIsYellow = (color === "yellow");
        currentIsTarget = (char === "X" && color === "white") || currentIsYellow;
        lastWasTarget = currentIsTarget;
        canClick = true; clickCount = 0; total++;
        startTime = performance.now();
        
        letterDiv.innerText = char;
        letterDiv.style.color = currentIsYellow ? "#FFD700" : (color === "red" ? "#FF4444" : "white");
        
        let speed = isPractice ? 1100 : Math.max(400, 1000 - (total * 12));
        
        clearTimeout(timer);
        timer = setTimeout(() => {
            if (canClick) {
                if (currentIsTarget) { 
                    missed++; 
                    showFeedback("TOO LATE!", "#FFA500");
                    flash('bad');
                    sounds.fall(); 
                }
                canClick = false;
                nextRound();
            }
        }, speed);
    }, Math.random() * 300 + 200);
}

function handleInput() {
    if (!running || !canClick) { 
        if(running) { mistakes++; showFeedback("!", "#FF4444"); flash('bad'); sounds.bump(); } 
        return; 
    }
    clickCount++;
    if (currentIsTarget) {
        if (currentIsYellow) {
            if (clickCount === 1) {
                clearTimeout(timer);
                timer = setTimeout(() => {
                    if (canClick) { 
                        missed++; showFeedback("TOO SLOW!", "#FFA500");
                        flash('bad'); sounds.fall(); canClick = false; nextRound(); 
                    }
                }, 600);
            } else if (clickCount === 2) { processHit(); }
        } else { processHit(); }
    } else {
        mistakes++; showFeedback("MISS!", "#FF4444"); flash('bad');
        sounds.bump(); canClick = false;
        clearTimeout(timer); nextRound();
    }
}

function processHit() {
    const rt = performance.now() - startTime;
    reactionTimes.push(rt);
    canClick = false; clearTimeout(timer);
    score++;
    showFeedback("OK!", "#4CAF50");
    flash('good');
    
    if(!isPractice) {
        let bonus = 100 + (score * 10);
        targetScore += bonus;
    } else {
        targetScore = score;
    }
    
    const marioCont = document.getElementById('mario-container');
    marioCont.style.transform = "translateY(-60px)";
    setTimeout(() => { marioCont.style.transform = "translateY(0)"; }, 120);
    sounds.coin();
    nextRound();
}

function startScoreTicker() {
    tickerId = setInterval(() => {
        if (currentDisplayScore < targetScore) {
            currentDisplayScore += Math.ceil((targetScore - currentDisplayScore) / 5);
            scoreEl.innerText = currentDisplayScore.toString().padStart(6, '0');
        }
    }, 20);
}

function endTest() {
    running = false; clearInterval(tickerId); bgm.pause();
    const avg = reactionTimes.length ? (reactionTimes.reduce((a,b)=>a+b)/reactionTimes.length).toFixed(0) : "---";
    document.getElementById("res-score").innerText = targetScore.toString().padStart(6, '0');
    document.getElementById("res-hit").innerText = score;
    document.getElementById("res-mistake").innerText = mistakes;
    document.getElementById("res-missed").innerText = missed;
    document.getElementById("res-rt-final").innerText = avg + "ms";
    document.getElementById("letter").style.display = "none";
    document.getElementById("result-screen").style.display = "flex";
    
    const top = localStorage.getItem("mario_top_score") || 0;
    if (targetScore > top) localStorage.setItem("mario_top_score", targetScore);
}

window.addEventListener("mousedown", (e) => { if(e.target.tagName !== 'BUTTON') handleInput(); });
window.addEventListener("touchstart", (e) => { if(e.target.tagName !== 'BUTTON') { e.preventDefault(); handleInput(); } }, {passive: false});
// 1. 在 script 中加入這個發送函式
function uploadRecord(finalData) {
    const scriptURL = '你的 Google Apps Script 部署網址'; // 貼上剛剛複製的 URL

    fetch(scriptURL, {
        method: 'POST',
        mode: 'no-cors', // 這是為了避開跨網域問題
        cache: 'no-cache',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(finalData)
    })
    .then(() => console.log("Data sent!"))
    .catch(error => console.error('Error!', error.message));
}

// 2. 找到你的 endTest() 函式，在裡面計算完數據後加入呼叫
function endTest() {
    running = false; clearInterval(tickerId); bgm.pause();
    const avg = reactionTimes.length ? (reactionTimes.reduce((a,b)=>a+b)/reactionTimes.length).toFixed(0) : "---";
    
    // 準備要發送的資料包
    const finalData = {
        score: targetScore,
        hits: score,
        mistakes: mistakes,
        missed: missed,
        rt: avg
    };

    // 執行發送
    uploadRecord(finalData);

    // ... 原本顯示結果畫面的代碼 ...
    document.getElementById("res-score").innerText = targetScore.toString().padStart(6, '0');
    // (後略)
}  
</script>
</body>
</html>
